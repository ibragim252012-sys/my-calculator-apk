name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flet
        run: pip install flet

      - name: Build APK silently
        run: flet build apk
        env:
          FLUTTER_VERSION: "3.24.0"   # Чуть более старая, но очень стабильная версия Flutter
          FLET_AUTO_ACCEPT: "true"    # САМОЕ ВАЖНОЕ: не спрашивать "y/n"

      - name: Save APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/apk/release/app-release.apk
